name: AI Reliability Lab CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e packages/shared
        pip install -e packages/sdk
        pip install -e packages/evals
        pip install -e packages/reliability
        pip install -e apps/api
        pip install -e apps/worker
        pip install pytest pytest-asyncio black mypy

    - name: Lint with black
      run: black --check packages/ apps/

    - name: Type check with mypy
      run: mypy packages/shared/src packages/sdk/src packages/evals/src packages/reliability/src

    - name: Test with pytest
      run: pytest packages/ apps/ -v --cov=packages --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml

  test-dashboard:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/dashboard/package-lock.json

    - name: Install dependencies
      working-directory: apps/dashboard
      run: npm ci

    - name: Build dashboard
      working-directory: apps/dashboard
      run: npm run build

    - name: Lint dashboard
      working-directory: apps/dashboard
      run: npm run lint

  regression-test:
    runs-on: ubuntu-latest
    needs: [test-python]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install packages
      run: |
        pip install -e packages/shared
        pip install -e packages/sdk
        pip install -e packages/evals
        pip install -e packages/reliability

    - name: Run benchmark suite
      run: |
        python benchmarks/runner.py

    - name: Run regression smoke test
      run: |
        python demo.py

  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: infra/docker/Dockerfile.api
        push: false
        tags: reliability-lab/api:test

    - name: Build Dashboard Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: infra/docker/Dockerfile.dashboard
        push: false
        tags: reliability-lab/dashboard:test
