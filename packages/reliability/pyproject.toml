[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reliability-engine"
version = "0.1.0"
description = "AI Reliability Lab - Reliability Engine"
requires-python = ">=3.10"
dependencies = [
    "reliability-shared",
    "numpy>=1.24.0",
]


[tool.hatch.build.targets.wheel]
packages = ["src/reliability_engine"]
