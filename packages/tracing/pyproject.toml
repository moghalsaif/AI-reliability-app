[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reliability-tracing"
version = "0.1.0"
description = "AI Reliability Lab - Tracing package"
requires-python = ">=3.10"
dependencies = [
    "reliability-shared",
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
]


[tool.hatch.build.targets.wheel]
packages = ["src/reliability_tracing"]
