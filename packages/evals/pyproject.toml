[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reliability-evals"
version = "0.1.0"
description = "AI Reliability Lab - Evaluation Engine"
requires-python = ">=3.10"
dependencies = [
    "reliability-shared",
    "numpy>=1.24.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
embeddings = ["sentence-transformers>=2.2.0", "torch>=2.0.0"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "black>=23.0",
    "mypy>=1.0",
]


[tool.hatch.build.targets.wheel]
packages = ["src/reliability_evals"]
