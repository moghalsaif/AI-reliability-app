[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reliability-prompts"
version = "0.1.0"
description = "AI Reliability Lab - Prompt templates"
requires-python = ">=3.10"
dependencies = [
    "reliability-shared",
    "jinja2>=3.1.0",
]


[tool.hatch.build.targets.wheel]
packages = ["src/reliability_prompts"]
