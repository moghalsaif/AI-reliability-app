version: "3.8"

services:
  # ClickHouse - Trace storage
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: reliability_lab
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis - Queue and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # PostgreSQL - Metadata and config
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: reliability_lab
      POSTGRES_USER: reliability
      POSTGRES_PASSWORD: reliability_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliability -d reliability_lab"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # API - FastAPI backend
  api:
    build:
      context: ../apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=reliability_lab
      - REDIS_URL=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api/src:/app/src
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Worker - Celery workers
  worker:
    build:
      context: ../apps/worker
      dockerfile: ../../infra/docker/Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
    depends_on:
      - redis
      - clickhouse
    volumes:
      - ../apps/worker/src:/app/src
    command: celery -A worker worker --loglevel=info

  # Evaluator - Evaluation worker
  evaluator:
    build:
      context: ../apps/evaluator
      dockerfile: ../../infra/docker/Dockerfile.evaluator
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - redis
      - clickhouse
    volumes:
      - ../apps/evaluator/src:/app/src

  # Dashboard - Next.js frontend
  dashboard:
    build:
      context: ../apps/dashboard
      dockerfile: ../../infra/docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  # Ollama - Local LLM inference
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment to pull models on startup
    # entrypoint: >
    #   sh -c "ollama serve &
    #   sleep 5
    #   ollama pull qwen3:32b
    #   ollama pull mistral
    #   wait"

  # Jaeger - Distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  clickhouse_data:
  redis_data:
  postgres_data:
  qdrant_data:
  ollama_data:
  prometheus_data:
  grafana_data:
