apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliability-api
  namespace: reliability-lab
  labels:
    app: reliability-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reliability-api
  template:
    metadata:
      labels:
        app: reliability-api
    spec:
      containers:
        - name: api
          image: reliability-lab/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: CLICKHOUSE_HOST
              value: "clickhouse-service"
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-service:4317"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: reliability-api-service
  namespace: reliability-lab
spec:
  selector:
    app: reliability-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliability-worker
  namespace: reliability-lab
  labels:
    app: reliability-worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: reliability-worker
  template:
    metadata:
      labels:
        app: reliability-worker
    spec:
      containers:
        - name: worker
          image: reliability-lab/worker:latest
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: CLICKHOUSE_HOST
              value: "clickhouse-service"
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliability-dashboard
  namespace: reliability-lab
  labels:
    app: reliability-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reliability-dashboard
  template:
    metadata:
      labels:
        app: reliability-dashboard
    spec:
      containers:
        - name: dashboard
          image: reliability-lab/dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://reliability-api-service"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: reliability-dashboard-service
  namespace: reliability-lab
spec:
  selector:
    app: reliability-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reliability-lab-ingress
  namespace: reliability-lab
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.reliability-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reliability-api-service
                port:
                  number: 80
    - host: dashboard.reliability-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reliability-dashboard-service
                port:
                  number: 80
